services:
  - type: web
    name: farmacis-api
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: farmacis-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: APP_URL
        sync: false # Coloque aqui a URL que o Render te der (ex: https://farmacis.onrender.com)

databases:
  - name: farmacis-db
    plan: free
    postgresStringData:
      - key: sslmode
        value: require